version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cement_db
      POSTGRES_USER: cement
      POSTGRES_PASSWORD: cement
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cement -d cement_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./sample-data:/data/csv
      - ./backend:/app/backend
    environment:
      - CSV_BASE_PATH=/data/csv
      - CSV_REFRESH_INTERVAL_SECONDS=900
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS_STR=http://localhost:5173
      - DATABASE_URL=postgresql+asyncpg://cement:cement@db:5432/cement_db
      - SECRET_KEY=local-dev-secret-replace-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  pgdata:
